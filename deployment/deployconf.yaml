      MASTER_IP = os.environ.get('MASTER__NODE_ID__IP')
      METADATA_PORT = int(os.environ.get('MOONCAKE_METADATA__PORT', 100000000000000000)) # left a dummy int port for fluxon mode
      MASTER_PORT = int(os.environ.get('MASTER__PORT'))
      
      CONFIG: Dict[str, Any] = {
          'server_type': 'manully',
          'benchmark': {
              # 使用 MPMC 模式（消息队列）
              # 'mode': 'MPMC',
              'mode': 'KVSTORE',
              'workers': 20,
              # 'max_benchmark_seconds': 180,
              'max_benchmark_seconds': 30,
              # Metrics warmup window (seconds). Ensure max_benchmark_seconds - metric_warmup_seconds >= 30.
              'metric_warmup_seconds': 0,
              'value_size': 20360128,  #20360128, # 28MB, 256 tokens of Qwen3-1.7B
              # 可选：针对给定 baseline_value_size（即上面的 value_size），
              # 在以下 workers_list 中逐个切换并发线程数进行压测。
              # 配置为空列表时表示不做 workers sweep。
              'workers_list': [10, 20],
              # 可选：针对给定 baseline_workers（即上面的 workers），
              # 在以下 value_size_list 中逐个切换 value_size 进行压测。
              # 配置为空列表时表示不做 value_size sweep。
              'value_size_list': [2097152, 8388608, 33554432],
              'consumer_sim_handle_ms_range': [700, 1500]
          },
      # KV 全局基准配置（与 kv_base 结构一致）
      'kv_base': {
          'instance_key': 'single-node-default',
          'contribute_to_cluster_pool_size': {'dram': 0, 'vram': {}},
          'fluxonkv_spec': {
              'cluster_name': CLUSTER_NAME,
              'share_mem_path': SHARED_MEM,
          },
              # 如果需要切 mooncake，可以在这里启用 mooncake_spec
              # 'mooncake_spec': {
              #     'local_buffer_size': 134217728,

schema_version: 1

nix_pack:
  config_path: setup_and_pack/nix/pack_fluxonkv_pylib.yaml
  store_root: /nix
  require_store_root_mountpoint: true
  prepare_project_data_root: true
  prepare_assembly_baseline_parent: true
  prepare_manylinux_cache_dirs: true
  required_commands:
    - docker

apt:
  packages:
    - build-essential
    - ca-certificates
    - clang
    - cmake
    - curl
    - git
    - hwloc
    - libaio-dev
    - libclang-dev
    - libfabric-dev
    - libhwloc-dev
    - libibverbs-dev
    - libnl-3-dev
    - libnl-route-3-dev
    - libnuma-dev
    - libssl-dev
    - libtool
    - libunwind-dev
    - libunwind8
    - llvm-dev
    - ninja-build
    - pkg-config
    - protobuf-compiler
    - python3
    - python3-dev
    - python3-pip
    - python3-venv
    - python3-yaml
    - wget

pip:
  packages:
    - maturin
    - pyinstrument
    - pyscript-util
    - setuptools
    - setuptools-rust
    - wheel

commands:
  - name: install_rust_toolchain
    shell: |
      if [ ! -x "$HOME/.cargo/bin/rustup" ]; then
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain __FLUXON_RUST_TOOLCHAIN__ --no-modify-path
      fi
      "$HOME/.cargo/bin/rustup" toolchain install __FLUXON_RUST_TOOLCHAIN__ --profile minimal
      "$HOME/.cargo/bin/rustup" default __FLUXON_RUST_TOOLCHAIN__
      "$HOME/.cargo/bin/rustup" component add clippy rustfmt
      if ! grep -Fq '. "$HOME/.cargo/env"' "$HOME/.bashrc"; then
        printf '\n. "$HOME/.cargo/env"\n' >> "$HOME/.bashrc"
      fi
      "$HOME/.cargo/bin/rustc" --version
      "$HOME/.cargo/bin/cargo" --version

  - name: install_repo_python_dev_deps
    cwd: .
    shell: |
      python3 -m pip install --upgrade -e '.[dev]'

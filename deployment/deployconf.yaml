              #     'master_server_address': f"{MASTER_IP}:{MASTER_PORT}",
              #     'etcd_addresses': [ETCD],
              # },
          },
          # MQ 全局基准配置
          'mq_new_or_bind_unique_key': "benchmq",
          'mq_base': {
              'capacity': 40,
              'ttl_seconds': 90,
          },
          # 每节点覆盖：kv + mq_role + mq
          'node_overrides': [
              {
                  'kv': {'instance_key': 'bench1'},
                  'mq_role': 'producer',
                  'mq': {'weight': 1.0},
              },
              {
                  'kv': {'instance_key': 'bench2', 'fluxonkv_spec': {
                       'etcd_addresses': [ETCD],
                       'cluster_name': CLUSTER_NAME,
                       'share_mem_path': SHARED_MEM2,
                   }},
                  'mq_role': 'consumer',
                  # 'mq': {'weight': 1.0},
              },
              # {

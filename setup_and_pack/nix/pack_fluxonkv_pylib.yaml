schema_version: 1

# store controls only the persistent experiment data location.
# project_root is detected from the config path by walking upward to a repo-like root.
store:
  project_data_root: /mnt/disk_c/fluxon-store-experiment-yxrxy

# runtime selects the manylinux OS baseline, target architectures, and Python ABI.
# The script derives execution_substrate, base_system_key, and runtime_abi_key from these fields.
runtime:
  # Selects the manylinux baseline shared by all runtime targets in this config.
  base_system: manylinux_2_28
  # Expands this config into one runtime target per architecture.
  architectures:
    - x86_64
  # Selects the Python ABI identity carried by each derived runtime target.
  python_abi: cpython3.10

# profile points at the immutable Nix-style authority tree consumed by the
# manylinux runtime. Runtime execution must not depend on host checkout paths.
profile:
  source_kind: bridge_prebuilt
  build_root_path: /workspace
  native_runtime_dir_names:
    - native_runtime
    - cxxpacked
    - vendor_runtime
  target_support_dir_names:
    - meson-0.64.0
  ext_bundle_dir_name: vendor_runtime

# assembly is the authority object graph for the published profile view.
# objects stay flat on purpose: each node has a kind, deps, and authority_ref.
assembly:
  baseline_path: /mnt/disk_c/fluxon-store-experiment-yxrxy/manylinux-release
  root_object: manylinuxProfileClosedSdk
  export_roots:
    published_profile_nix: manylinuxProfileClosedSdk
  objects:
    toolchain:
      kind: manylinux_toolchain
      deps: []
      authority_ref: manylinux.toolchain
      params: {}

    workspaceSeed:
      kind: workspace_seed
      deps: []
      authority_ref: published_profile.workspace_seed
      params: {}

    fluxonCommuAuthority:
      kind: fluxon_commu_runtime_source
      deps: []
      authority_ref: runtime_sources.fluxon_commu
      params: {}

    targetSupport:
      kind: target_support
      deps: []
      authority_ref: published_profile.target_support
      params: {}

    vendorRuntime:
      kind: vendor_runtime
      deps: []
      authority_ref: published_profile.native.vendor_runtime
      params: {}

    nativeRuntime:
      kind: native_runtime
      deps:
        - workspaceSeed
        - fluxonCommuAuthority
        - targetSupport
        - vendorRuntime
        - cxxpacked
      authority_ref: published_profile.native.native_runtime
      params:
        prepare_build_scenario: cargo_closed_sdk_runtime

    cxxpacked:
      kind: cxxpacked
      deps: []
      authority_ref: published_profile.native.cxxpacked
      params: {}

    fluxonPyo3WheelClosedSdk:
      kind: pyo3_wheel
      deps:
        - toolchain
        - workspaceSeed
        - vendorRuntime
        - cxxpacked
        - nativeRuntime
      authority_ref: published_profile.wheel_argument
      params: {}

    manylinuxProfileClosedSdk:
      kind: manylinux_profile
      deps:
        - toolchain
        - workspaceSeed
        - targetSupport
        - vendorRuntime
        - nativeRuntime
        - fluxonPyo3WheelClosedSdk
      authority_ref: published_profile.root
      params: {}

# manylinux contains runtime parameters for the actual wheel pack container run.
# The manylinux version is derived from runtime.base_system and is not configured here.
manylinux:
  runtime_image_ref: pypack-builder-nix-experiment:latest
  transport_backend: tcp_thread
  rdma_backend: closed_sdk
  backend_plans:
    closed_sdk:
      profile_object_id: manylinuxProfileClosedSdk
      native_object_id: nativeRuntime
      shared_native_input_object_ids:
        - cxxpacked
        - vendorRuntime
      protoc_object_id: cxxpacked
      path_object_ids:
        - cxxpacked
        - vendorRuntime
      ld_library_object_ids:
        - cxxpacked
        - vendorRuntime
      extra_path_dir_names: []
      extra_ld_library_dir_names: []
      external_mounts:
        vendor_runtime:
          container_path: /nix_profile/native/vendor_runtime
          project_relative_path: fluxon_rs/target/vendor_runtime
      wheel_finalize_steps:
        - kind: add_vendor_runtime
  cargo_registry_dir: /mnt/disk_c/fluxon-store-experiment-yxrxy/manylinux-cache/cargo-registry
  cargo_git_dir: /mnt/disk_c/fluxon-store-experiment-yxrxy/manylinux-cache/cargo-git

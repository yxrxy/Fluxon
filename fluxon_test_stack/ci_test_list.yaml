schema_version: 9

run:
  mode: full_once
  selectors:
    case_ids: ALL
    profile_ids: [fluxon_fastws, fluxon_tquic, fluxon_sockudo_ws, fluxon_tcp]
    command_ids: ALL
    test_ids: ALL

scenes:
  ci_top_attention_doc_page_build:
    ci:
      subject: doc_page
      runtime_contract: rust_self_managed
      prepare:
        - kind: setup_dev_env
          config: setup_and_pack/setup_dev_env/doc_page_ci.yaml
          cache_relpath: .cached/fluxon_doc_site/toolchain
    select:
      scales: [n1_kvowner_dram_3gib]
      profiles: [fluxon_tcp]

  ci_top_attention_bin_kvtest:
    ci:
      subject: rust
      runtime_contract: rust_self_managed
    select:
      scales: [n1_kvowner_dram_20gib]
      profiles: [fluxon_tcp]

  kv_read_heavy_zipf:
    test_stack:
      mode: KVSTORE
      read_ratio: 0.9
      write_ratio: 0.1
      request_distribution: zipfian
      keyspace_size: 512
      value_size_mode: RANDOM_WEIGHTED_SET
      value_size_weighted_set:
        - size_bytes: 10485760
          weight: 0.25
        - size_bytes: 16777216
          weight: 0.25
        - size_bytes: 25165824
          weight: 0.25
        - size_bytes: 31457280
          weight: 0.25
    select:
      scales: [n1_kvowner_dram_20gib, n2_kvowner_dram_20gib]
      profiles: [fluxon_fastws, fluxon_tquic, fluxon_sockudo_ws, fluxon_tcp, redis_sharded]

  kv_read_heavy_affinity:
    test_stack:
      mode: KVSTORE
      read_ratio: 0.9
      write_ratio: 0.1
      request_distribution: zipfian
      affinity_locality_ratio: 0.85
      keyspace_size: 512
      value_size_mode: RANDOM_WEIGHTED_SET
      value_size_weighted_set:
        - size_bytes: 10485760
          weight: 0.25
        - size_bytes: 16777216
          weight: 0.25
        - size_bytes: 25165824
          weight: 0.25
        - size_bytes: 31457280
          weight: 0.25
    select:
      scales: [n2_kvowner_dram_20gib]
      profiles: [fluxon_fastws, fluxon_tquic, fluxon_sockudo_ws, fluxon_tcp, redis_sharded]

  kv_write_heavy_large_value:
    test_stack:
      mode: KVSTORE
      read_ratio: 0.0
      write_ratio: 1.0
      request_distribution: uniform
      keyspace_size: 10000
      value_size_mode: RANDOM_WEIGHTED_SET
      value_size_weighted_set:
        - size_bytes: 10000
          weight: 0.2
        - size_bytes: 100000
          weight: 0.2
        - size_bytes: 1000000
          weight: 0.2
        - size_bytes: 10000000
          weight: 0.2
        - size_bytes: 50000000
          weight: 0.2
    select:
      scales: [n1_kvowner_dram_20gib, n2_kvowner_dram_20gib]
      profiles: [fluxon_fastws, fluxon_tquic, fluxon_sockudo_ws, redis_sharded]

  rpc_echo_small_payload:
    test_stack:
      mode: RPC
      rpc_backend_kind: FLUXON
      rpc_path: /bench/echo
      rpc_payload_size: 4096
      rpc_payload_mode: BYTES
      rpc_server_source: benchmark_node_role
      rpc_target_role: seed
      read_ratio: 1.0
      write_ratio: 0.0
      request_distribution: uniform
      keyspace_size: 1
    select:
      scales: [n1_kvowner_dram_20gib, n2_kvowner_dram_20gib]
      profiles: [fluxon_fastws, fluxon_tquic, fluxon_sockudo_ws, fluxon_tcp]

  rpc_echo_small_payload_zerorpc:
    test_stack:
      mode: RPC
      rpc_backend_kind: ZERORPC
      rpc_path: /bench/echo
      rpc_payload_size: 4096
      rpc_payload_mode: BYTES
      rpc_server_source: benchmark_node_role
      rpc_target_role: seed
      zerorpc_port_base: 29779
      zerorpc_port_stride: 20
      read_ratio: 1.0
      write_ratio: 0.0
      request_distribution: uniform
      keyspace_size: 1
    select:
      scales: [n1_kvowner_dram_20gib, n2_kvowner_dram_20gib]
      profiles: [fluxon_fastws, fluxon_tquic, fluxon_sockudo_ws, fluxon_tcp]

  fs_open_read_close_smallfiles:
    test_stack:
      mode: PY_FS
      file_size_bytes: 4096
      files_per_worker: 512
      cache_max_bytes: 268435456
    select:
      scales: [n1_kvowner_dram_20gib, n2_kvowner_dram_20gib]
      profiles: [fluxon_fastws, fluxon_tquic, fluxon_sockudo_ws, fluxon_tcp, alluxio_posix]

  fs_write_close_commit:
    test_stack:
      mode: PY_FS
      file_size_bytes: 1048576
      chunk_size_bytes: 262144
      files_per_worker: 64
      cache_max_bytes: 268435456
    select:
      scales: [n1_kvowner_dram_20gib, n2_kvowner_dram_20gib]
      profiles: [fluxon_fastws, fluxon_tquic, fluxon_sockudo_ws, fluxon_tcp, alluxio_posix]

  bench_mq:
    test_stack:
      mode: MPMC
      role_weights:
        producer: 1
        consumer: 1
    select:
      scales: [n1_kvowner_dram_20gib, n2_kvowner_dram_20gib]
      profiles: [fluxon_fastws, fluxon_tquic, fluxon_sockudo_ws, fluxon_tcp]

scales:
  n1_kvowner_dram_3gib:
    duration_seconds: 60
    topology: 1
    targets:
      hosts: [infra44-ThinkStation-PX]
    owner:
      owner_count: 1
      owner_dram_bytes: 3221225472
    benchmark: &bench_benchmark
        processes_per_target: 1
        threads_per_process: 4
        value_size: 16384
        metric_warmup_seconds: 0
        op_timeout_seconds: 30
        cluster_ready_timeout_seconds: 660
        value_size_list: []
        consumer_sim_handle_ms_range: [700, 1500]

  n1_kvowner_dram_20gib:
    duration_seconds: 60
    topology: 1
    targets:
      hosts: [infra44-ThinkStation-PX]
    owner:
      owner_count: 1
      owner_dram_bytes: 21474836480
    benchmark: *bench_benchmark

  n2_kvowner_dram_3gib:
    duration_seconds: 60
    topology: 2
    targets:
      hosts: [infra44-ThinkStation-PX, infra46-ThinkStation-PX]
    owner:
      owner_count: 2
      owner_dram_bytes: 3221225472
    benchmark: *bench_benchmark

  n2_kvowner_dram_20gib:
    duration_seconds: 60
    topology: 2
    targets:
      hosts: [infra44-ThinkStation-PX, infra46-ThinkStation-PX]
    owner:
      owner_count: 2
      owner_dram_bytes: 21474836480
    benchmark: *bench_benchmark


    test_rsc_source: &test_rsc_source_tquic
      kind: FLUXON_OPS_FS_S3
      bucket: fluxon-release
      access_key: admin
      secret_key: admin
      region: us-east-1
      key_prefix: test_rsc/fluxon_tquic
    test_rsc_artifacts:
      ci_src_archive: src_ci.tar.gz
      ci_ext_rsc_archive: fluxon_ci_ext_rsc.tar.gz
  fluxon_sockudo_ws:
    release_source: &release_source_sockudo_ws
      kind: FLUXON_OPS_FS_S3
      bucket: fluxon-release
      access_key: admin
      secret_key: admin
      region: us-east-1
      key_prefix: profiles/fluxon_sockudo_ws
    release_artifacts:
      python_wheel: fluxon-0.2.1-py3-none-any.whl
      pyo3_wheel: fluxon_pyo3-0.2.1-cp38-abi3-manylinux_2_28_x86_64.whl
    test_rsc_source: &test_rsc_source_sockudo_ws
      kind: FLUXON_OPS_FS_S3
      bucket: fluxon-release
      access_key: admin
      secret_key: admin
      region: us-east-1
      key_prefix: test_rsc/fluxon_sockudo_ws
    test_rsc_artifacts:
      ci_src_archive: src_ci.tar.gz
      ci_ext_rsc_archive: fluxon_ci_ext_rsc.tar.gz
  fluxon_tcp:
    release_source: &release_source_tcp
      kind: FLUXON_OPS_FS_S3
      bucket: fluxon-release
      access_key: admin
      secret_key: admin
      region: us-east-1
      key_prefix: profiles/fluxon_tcp
    release_artifacts:
      python_wheel: fluxon-0.2.1-py3-none-any.whl
      pyo3_wheel: fluxon_pyo3-0.2.1-cp38-abi3-manylinux_2_28_x86_64.whl
    test_rsc_source: &test_rsc_source_tcp
      kind: FLUXON_OPS_FS_S3
      bucket: fluxon-release
      access_key: admin
      secret_key: admin
      region: us-east-1
      key_prefix: test_rsc/fluxon_tcp
    test_rsc_artifacts:
      ci_src_archive: src_ci.tar.gz
      ci_ext_rsc_archive: fluxon_ci_ext_rsc.tar.gz

profiles:
  fluxon_fastws:
    artifact_set: fluxon_fastws
    runtime:
      ci: &common_ci_runtime
        deploy:
          adapter_cmd:
            - test_profile_adapter.py
          controller_url: __STACK_CONTROLLER_URL__
          target_ip_map:
            infra44-ThinkStation-PX: 192.168.151.44
            infra46-ThinkStation-PX: 192.168.151.46
          bootstrap_ready_timeout_seconds: 300
        scene_configs:
          ci_top_attention_doc_page_build:
            doc_site_base_url: example.com
          ci_top_attention_bin_kvtest:
            kv_test_rounds: all
        runtime_contracts:
          cluster_kv_owner: &cluster_kv_owner_runtime
            base_runtime:
              etcd:
                target: infra44-ThinkStation-PX
                endpoint:
                  scheme: HTTP
                  host_port: 32579
              greptime:
                target: infra44-ThinkStation-PX
                endpoint:
                  scheme: HTTP
                  host_port: 34030
            case_runtime:
              master:
                lifecycle: service
                k8s_ref: deployment/master
                deployer:
                  target: infra44-ThinkStation-PX
                  command: [/bin/bash, -lc]
                  args:
                    - |
                      set -euo pipefail
                      cd __RUN_DIR__/src
                      exec __RUN_DIR__/venv/bin/python3 -m fluxon_py.runtime.start_master \
                        -c __RUN_DIR__/configs/ci_master.yaml \
                        -w __RUN_DIR__/services/master
              owner_0:
                lifecycle: service
                k8s_ref: deployment/owner_0
                deployer:
                  target: __TARGET__
                  command: [/bin/bash, -lc]
                  args:
                    - |
                      set -euo pipefail
                      cd __RUN_DIR__/src
                      exec __RUN_DIR__/venv/bin/python3 -m fluxon_py.runtime.start_owner_kvclient \
                        -c __RUN_DIR__/configs/ci_owner_0.yaml \
                        -w __RUN_DIR__/services/owner_0
              ci_runner: &common_ci_runner_instance
                lifecycle: job
                k8s_ref: deployment/ci_runner
                deployer:
                  target: __TARGET__
                  command: [/bin/bash, -lc]
                  args:
                    - |
                      set -uo pipefail
                      exec bash __RUN_DIR__/ci_runner.sh
          rust_self_managed:
            base_runtime:
              etcd:
                target: infra44-ThinkStation-PX
                endpoint:
                  scheme: HTTP
                  host_port: 32579
              greptime:
                target: infra44-ThinkStation-PX
                endpoint:
                  scheme: HTTP
                  host_port: 34030
            case_runtime:
              ci_runner:
                <<: *common_ci_runner_instance

      test_stack: &common_test_stack_runtime
        kind: FLUXON
        # English note:
        # - Coordinator readiness here means the benchmark TCP port is actually bound.
        # - This must stay explicit because first-run runtime bootstrap time is workload-dependent.
        coordinator_ready_timeout_seconds: 300
        port_alloc:
          by_topology:
            1:
              coordinator_port_base: 17779
              coordinator_port_stride: 10
              kv_master_port_base: 50061
              kv_master_port_stride: 10
              kv_p2p_port_base: 11666
              kv_p2p_port_stride: 66
            2:
              coordinator_port_base: 18779
              coordinator_port_stride: 10
              kv_master_port_base: 50161
              kv_master_port_stride: 10
              kv_p2p_port_base: 11666
              kv_p2p_port_stride: 66
        deploy:
          adapter_cmd:
            - test_profile_adapter.py
          controller_url: __STACK_CONTROLLER_URL__
          target_ip_map:
            infra44-ThinkStation-PX: 192.168.151.44
            infra46-ThinkStation-PX: 192.168.151.46
          bootstrap_ready_timeout_seconds: 300
        runtime_config:
          # This config is passed through into run_dir/benchmark_config.py.
          # Keep it explicit: no implicit defaults are added by the runner.
          kv_base: &self_host_test_stack_kv_base
            instance_key: bench_base
            contribute_to_cluster_pool_size: {dram: 0, vram: {}}
            fluxonkv_spec:
              cluster_name: __STACK_CLUSTER_NAME__
              # Self-host benchmark nodes are launched by the host-side deployer, not inside a
              # container with /hostworkdir mounted. Use the real host path so both infra44/46
              # benchmark nodes can open the same self-host shared-memory root directly.
              shared_memory_path: __STACK_SHARED_MEMORY_PATH__
          mq_base:
            capacity: 40
            ttl_seconds: 90
          kv_node_patch_template: {}
        deploy_templates:
          coordinator:
            lifecycle: service
            k8s_ref: deployment/test_stack_coord
            deployer:
              target: infra44-ThinkStation-PX
              command: [/bin/bash, -lc]
              args:
                - |
                  # Placeholder only. test_runner.py rewrites the actual TEST_STACK
                  # launch command and resolves the interpreter from target hostworkdir.
                  :
          node:
            lifecycle: job
            k8s_ref: deployment/test_stack_node___INSTANCE_KEY__
            deployer:
              target: __TARGET__
              command: [/bin/bash, -lc]
              args:
                - |
                  # Placeholder only. test_runner.py rewrites the actual TEST_STACK
                  # launch command and resolves the interpreter from target hostworkdir.
                  : "__INSTANCE_KEY__ __COORDINATOR__"
  fluxon_tquic:
    artifact_set: fluxon_tquic
    runtime:
      ci:
        <<: *common_ci_runtime
        scene_configs:
          ci_top_attention_doc_page_build:
            doc_site_base_url: example.com
          ci_top_attention_bin_kvtest:
            kv_test_rounds: all
      test_stack:
        <<: *common_test_stack_runtime
  fluxon_sockudo_ws:
    artifact_set: fluxon_sockudo_ws
    runtime:
      ci:
        <<: *common_ci_runtime
        scene_configs:
          ci_top_attention_doc_page_build:
            doc_site_base_url: example.com
          ci_top_attention_bin_kvtest:
            kv_test_rounds: all
      test_stack:
        <<: *common_test_stack_runtime
  fluxon_tcp:
    artifact_set: fluxon_tcp
    runtime:
      ci:
        <<: *common_ci_runtime
        scene_configs:
          ci_top_attention_doc_page_build:
            doc_site_base_url: example.com
          ci_top_attention_bin_kvtest:
            kv_test_rounds: all
      test_stack:
        <<: *common_test_stack_runtime
  redis_sharded:
    artifact_set: fluxon_fastws
    runtime:
      test_stack:
        kind: REDIS
        coordinator_ready_timeout_seconds: 300
        port_alloc:
          by_topology:
            1:
              coordinator_port_base: 19779
              coordinator_port_stride: 10
              redis_port_base: 26379
              redis_port_stride: 10
            2:
              coordinator_port_base: 20779
              coordinator_port_stride: 10
              redis_port_base: 27379
              redis_port_stride: 10
        deploy:
          adapter_cmd:
            - test_profile_adapter.py
          controller_url: __STACK_CONTROLLER_URL__
          target_ip_map:
            infra44-ThinkStation-PX: 192.168.151.44
            infra46-ThinkStation-PX: 192.168.151.46
          bootstrap_ready_timeout_seconds: 300
        runtime_config:
          redis:
            server_bundle_test_rsc_relpath: baselines/redis/redis_bundle.tar.gz
            server_binary_test_rsc_relpath: baselines/redis/redis_bundle/bin/redis-server
            server_args: []
            connect_timeout_seconds: 5.0
            socket_timeout_seconds: 30.0
            database: 0
        deploy_templates:
          coordinator:
            lifecycle: service
            k8s_ref: deployment/test_stack_coord
            deployer:
              target: infra44-ThinkStation-PX
              command: [/bin/bash, -lc]
              args:
                - |
                  # Placeholder only. test_runner.py rewrites the actual TEST_STACK
                  # launch command and resolves the interpreter from target hostworkdir.
                  :
          node:
            lifecycle: job
            k8s_ref: deployment/test_stack_node___INSTANCE_KEY__
            deployer:
              target: __TARGET__
              command: [/bin/bash, -lc]
              args:
                - |
                  # Placeholder only. test_runner.py rewrites the actual TEST_STACK
                  # launch command and resolves the interpreter from target hostworkdir.
                  : "__INSTANCE_KEY__ __COORDINATOR__"
  alluxio_posix:
    artifact_set: fluxon_fastws
    runtime:
      test_stack:
        kind: ALLUXIO
        coordinator_ready_timeout_seconds: 300
        port_alloc:
          by_topology:
            1:
              coordinator_port_base: 21779
              coordinator_port_stride: 10
            2:
              coordinator_port_base: 22779
              coordinator_port_stride: 10
        deploy:
          adapter_cmd:
            - test_profile_adapter.py
          controller_url: __STACK_CONTROLLER_URL__
          target_ip_map:
            infra44-ThinkStation-PX: 192.168.151.44
            infra46-ThinkStation-PX: 192.168.151.46
          bootstrap_ready_timeout_seconds: 300
        runtime_config:
          alluxio:
            bundle_test_rsc_relpath: baselines/alluxio/alluxio_bundle.tar.gz
            bundle_root_relpath: baselines/alluxio/alluxio_bundle
            mount_root_by_target:
              infra44-ThinkStation-PX: /mnt/alluxio
              infra46-ThinkStation-PX: /mnt/alluxio
            namespace_prefix: fluxon_test_stack/alluxio
            mount_command_template: |
              cd __ALLUXIO_BUNDLE_ROOT__
              exec ./bin/alluxio-fuse mount __MOUNT_ROOT__
        deploy_templates:
          coordinator:
            lifecycle: service
            k8s_ref: deployment/test_stack_coord
            deployer:
              target: infra44-ThinkStation-PX
              command: [/bin/bash, -lc]
              args:
                - |
                  # Placeholder only. test_runner.py rewrites the actual TEST_STACK
                  # launch command and resolves the interpreter from target hostworkdir.
                  :
          node:
            lifecycle: job
            k8s_ref: deployment/test_stack_node___INSTANCE_KEY__
            deployer:
              target: __TARGET__
              command: [/bin/bash, -lc]
              args:
                - |
                  # Placeholder only. test_runner.py rewrites the actual TEST_STACK
                  # launch command and resolves the interpreter from target hostworkdir.
                  : "__INSTANCE_KEY__ __COORDINATOR__"

{% if show_error %}
  <div class="warn">{{ error_msg }}</div>
{% endif %}
<div class="row muted">
  Change password for the <span class="mono">viewer</span> account. Password changes apply to both UI
  Basic Auth and S3 SigV4 secret_key.
</div>
<form method="post" class="row" style="max-width:560px">
  <div class="field">
    <label>Current Password</label>
    <input type="password" name="current_password" required />
  </div>
  <div class="field">
    <label>New Password</label>
    <input type="password" name="new_password" required />
  </div>
  <div class="field">
    <label>Confirm New Password</label>
    <input type="password" name="confirm_new_password" required />
  </div>
  <div class="hint">Rules: non-empty; no leading/trailing whitespace.</div>
  <div class="row">
    <button class="btn primary" type="submit">Update Password</button>
  </div>
</form>

name: Deploy Fluxon Docs to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

env:
  DOC_SITE_IMAGE_REF: hanbaoaaa/fluxon-doc-site-builder:quartz-v5.0.0-node-v24.16.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set doc site base URL
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY#*/}"
          if [[ "$repo" == *.github.io ]]; then
            base_url="${repo,,}"
          else
            base_url="${owner}.github.io/${repo}"
          fi
          echo "FLUXON_DOC_SITE_BASE_URL=$base_url" >> "$GITHUB_ENV"

      - name: Install Python dependencies
        run: python3 -m pip install PyYAML

      - name: Build doc site
        run: |
          python3 scripts/build_doc_site_in_container.py \
            --repo-root "$PWD" \
            --image-ref "$DOC_SITE_IMAGE_REF" \
            --base-url "$FLUXON_DOC_SITE_BASE_URL"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: fluxon_release/doc_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

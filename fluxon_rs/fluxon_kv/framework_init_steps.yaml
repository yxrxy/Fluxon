version: 5
title: fluxon_kv init

variants:
  - id: master
    tags: [master]
  - id: owner
    tags: [owner]
  - id: external
    tags: [external]

# Runtime init resources.
#
# Rules:
# - `published_by` must reference an existing step id (idx>0).
# - Each `resources[].id` is a runtime gate (one-way NotReady -> Ready).
# - The init DAG runner executes a resource node after its `published_by` step completes:
#   it calls `<Framework as InitResourceHooks>::publish_<resource_id>(&fw)` and then marks
#   the resource ready in `ResourceRegistry`.
# - A step depends on a resource by declaring `deps: ["res:<resource_id>"]`.
resources:
  - id: cluster_member_watch_ready
    tags: [master, owner, external]
    publish_tags: [master, owner, external]
    published_by: ClusterManager.step.1.init2
    doc: |
      - ClusterManager: member watch 已建立(具备持续观测能力)
      - 提供: ClusterManager.listen() 可持续消费 ClusterEvent

  - id: owner_shared_mem_bundle_ready
    tags: [external]
    publish_tags: []
    published_by: ExternalClientApi.step.1.prepare
    doc: |
      - external: 等 shared.json+mmap.file -> mmap -> 等 owner member 可观测
      - owner: shared.json 由 owner 的 segment registration 流程写入(不在 init DAG 内显式建模)

  - id: prom_remote_write_wait_ready
    tags: [owner, external]
    publish_tags: [master]
    published_by: MetricReporter.step.1.prepare
    doc: |
      - master: 发布 prom remote_write urls(通过 cluster member state)
      - owner/external: 等待直到可观测到 master prom remote_write urls(best-effort)

# Init-step DAG source of truth.
#
# Rules:
# - The smallest node is a module init step: `<Module>.step.<idx>.<name>`.
# - Step indices must be contiguous per module: 0..n-1.
# - step.0 is always `Construct` (no runtime PostView).
# - `deps` is the single source of truth for scheduling (wait).
# - Each deps entry is either a step id or a resource reference: "res:<resource_id>" (gated by a runtime resource node).
# - Step-0 is always Construct (no PostView allowed).
# - PostView is attached by a compiler-inserted barrier node:
#   `Framework.step.0.attach_views`.

module_tags:
  ClusterManager: [master, owner, external]
  P2pModule: [master, owner, external]
  MasterSegManager: [master]
  MasterKvRouter: [master]
  MetricReporter: [master, owner, external]
  ClientKvApi: [owner]
  ClientSegPool: [owner]
  ClientTransferEngine: [master, owner]
  ExternalClientApi: [external]
  MasterLeaseManager: [master]

steps:
  - id: ClusterManager.step.0.construct
    module: ClusterManager
    mode: Blocking
    deps: []
    doc: |
      - 构造: ClusterManager(无PostView)
      - 写 local_state: 保存连接参数/分配本地缓存；若提供 local_ipc_root，则在此处规范化后预填到 self member metadata(不启动任务)
      - 依赖: 无
    exec:
      kind: Construct
      call: "ClusterManager::construct"
      arg_field: "cluster_manager_arg"
    best_effort: null

  - id: P2pModule.step.0.construct
    module: P2pModule
    mode: Blocking
    deps: []
    doc: |
      - 构造: P2pModule(无PostView)
      - 写 local_state: 分配 P2P 状态/缓存(不启动 transport)
      - 依赖: 无
    exec:
      kind: Construct
      call: "P2pModule::construct"
      arg_field: "p2p_arg"
    best_effort: null

  - id: MasterSegManager.step.0.construct
    module: MasterSegManager
    mode: Blocking
    deps: []
    doc: |
      - 构造: MasterSegManager(无PostView)
      - 写 local_state: 分配段管理器状态(不注册RPC)
      - 依赖: 无
    exec:
      kind: Construct
      call: "MasterSegManager::construct"
      arg_field: "master_seg_manager_arg"
    best_effort: null

  - id: MasterKvRouter.step.0.construct
    module: MasterKvRouter
    mode: Blocking
    deps: []
    doc: |
      - 构造: MasterKvRouter(无PostView)
      - 写 local_state: 分配策略/缓存/通道(不注册RPC/不启动任务)
      - 依赖: 无
    exec:
      kind: Construct
      call: "MasterKvRouter::construct"
      arg_field: "master_kv_router_arg"
    best_effort: null

  - id: MetricReporter.step.0.construct
    module: MetricReporter
    mode: Blocking
    deps: []
    doc: |
      - 构造: MetricReporter(无PostView)
      - 写 local_state: 准备 registry/缓冲区(不启动 loop)
      - 依赖: 无
    exec:
      kind: Construct
      call: "MetricReporter::construct"
      arg_field: "metric_reporter_arg"
    best_effort: null

  - id: ClientKvApi.step.0.construct
    module: ClientKvApi
    mode: Blocking
    deps: []
    doc: |
      - 构造: ClientKvApi(无PostView)
      - 写 local_state: 分配 API 状态(不注册RPC)
      - 依赖: 无
    exec:
      kind: Construct
      call: "ClientKvApi::construct"
      arg_field: "client_kv_api_arg"
    best_effort: null

  - id: ClientSegPool.step.0.construct
    module: ClientSegPool
    mode: Blocking
    deps: []
    doc: |
      - 构造: ClientSegPool(无PostView)
      - 写 local_state: 准备共享内存相关状态(不写 cluster)
      - 依赖: 无
    exec:
      kind: Construct
      call: "ClientSegPool::construct"
      arg_field: "client_seg_pool_arg"
    best_effort: null

  - id: ClientTransferEngine.step.0.construct
    module: ClientTransferEngine
    mode: Blocking
    deps: []
    doc: |
      - 构造: ClientTransferEngine(无PostView)
      - 写 local_state: 准备 engine 状态(不启动后端)
      - 依赖: 无
    exec:
      kind: Construct
      call: "ClientTransferEngine::construct"
      arg_field: "client_transfer_engine_arg"
    best_effort: null

  - id: ExternalClientApi.step.0.construct
    module: ExternalClientApi
    mode: Blocking
    deps: []
    doc: |
      - 构造: ExternalClientApi(无PostView)
      - 写 local_state: 准备 external 状态(不做 owner discovery)
      - 依赖: 无
    exec:
      kind: Construct
      call: "ExternalClientApi::construct"
      arg_field: "external_client_api_arg"
    best_effort: null

  - id: MasterLeaseManager.step.0.construct
    module: MasterLeaseManager
    mode: Blocking
    deps: []
    doc: |
      - 构造: MasterLeaseManager(无PostView)
      - 写 local_state: 分配 lease 表/cleanup 状态(不注册RPC)
      - 依赖: 无
    exec:
      kind: Construct
      call: "MasterLeaseManager::construct"
      arg_field: "master_lease_manager_arg"
    best_effort: null

  - id: ClusterManager.step.1.init2
    module: ClusterManager
    mode: Blocking
    deps: []
    doc: |
      - 加入: etcd cluster(lease + self member)
      - 启动: watch members/metadata + event broadcast
      - 产出: cluster_state 可读写 + cluster_event
    exec:
      kind: Call
      call: "ClusterManager::init2_for_init_dag"
    best_effort: null

  - id: P2pModule.step.1.init2
    module: P2pModule
    mode: Blocking
    deps:
      - res:cluster_member_watch_ready
    doc: |
      - 启动: P2P transport + rpc core
      - 启动: cluster_event listener
      - 依赖: res:cluster_member_watch_ready(读成员变化)
    exec:
      kind: Call
      call: "P2pModule::init2_for_init_dag"
    best_effort: null

  - id: MasterSegManager.step.1.init2
    module: MasterSegManager
    mode: Blocking
    deps:
      - P2pModule.step.1.init2
    doc: |
      - 注册: seg RPC handler/caller
      - 依赖: P2pModule.step.1.init2(rpc transport)
    exec:
      kind: Call
      call: "MasterSegManager::init2_for_init_dag"
    best_effort: null

  - id: MasterKvRouter.step.1.init2
    module: MasterKvRouter
    mode: Blocking
    deps:
      - ClusterManager.step.1.init2
      - P2pModule.step.1.init2
    doc: |
      - 注册: master KV RPC handler/caller
      - 启动: router tasks(delete broadcast + cluster listener)
      - 依赖: ClusterManager.step.1.init2(监听成员) + P2pModule.step.1.init2(rpc)
    exec:
      kind: Call
      call: "MasterKvRouter::init2_for_init_dag"
    best_effort: null

  - id: MetricReporter.step.1.prepare
    module: MetricReporter
    mode: Blocking
    deps:
      - ClusterManager.step.1.init2
    doc: |
      - 启动: monitoring config watcher(异步更新 monitoring_config)
      - 注册: prom remote_write proxy RPC caller/handler
      - 依赖: ClusterManager.step.1.init2(读广播)
    exec:
      kind: Call
      call: "MetricReporter::init2_prepare"
    best_effort: null

  - id: MetricReporter.step.2.after_prom_remote_write_wait
    module: MetricReporter
    mode: Blocking
    deps:
      - res:prom_remote_write_wait_ready
    doc: |
      - 启动: metric_reporter_loop
      - 依赖: res:prom_remote_write_wait_ready(内部包含 publish/wait 逻辑) + 本模块 step.1(隐式顺序)
    exec:
      kind: Call
      call: "MetricReporter::init2_after_prom_remote_write_wait"
    best_effort: null

  - id: ClientKvApi.step.1.init2
    module: ClientKvApi
    mode: Blocking
    deps:
      - ClusterManager.step.1.init2
      - P2pModule.step.1.init2
    doc: |
      - 注册: KV API RPC handler/caller
      - 启动: client_cluster_listener
      - 依赖: ClusterManager.step.1.init2(读cluster) + P2pModule.step.1.init2(rpc)
    exec:
      kind: Call
      call: "ClientKvApi::init2_for_init_dag"
    best_effort: null

  - id: ClientSegPool.step.1.init2
    module: ClientSegPool
    mode: Blocking
    deps:
      - ClusterManager.step.1.init2
      - P2pModule.step.1.init2
    doc: |
      - 注册: RequestSegmentRegistration RPC handler
      - 写 cluster_state: share_group_binding(owner_id + owner_start_time)
      - 依赖: ClusterManager.step.1.init2(写cluster) + P2pModule.step.1.init2(rpc)
    exec:
      kind: Call
      call: "ClientSegPool::init2_for_init_dag"
    best_effort: null

  - id: ClientTransferEngine.step.1.init2
    module: ClientTransferEngine
    mode: Blocking
    deps:
      - ClusterManager.step.1.init2
      - P2pModule.step.1.init2
    doc: |
      - 等待: accessible_ip_ready(node_start_time)
      - 构建: transfer engine backend + p2p transfer rpc
      - 依赖: ClusterManager.step.1.init2(等ip/监听成员) + P2pModule.step.1.init2(rpc)
    exec:
      kind: Call
      call: "ClientTransferEngine::init2_for_init_dag"
    best_effort: null

  - id: ExternalClientApi.step.1.prepare
    module: ExternalClientApi
    mode: Blocking
    deps:
      - ClusterManager.step.1.init2
      - P2pModule.step.1.init2
    doc: |
      - 准备: ExternalClientApi init(不等待 owner)
      - 依赖: ClusterManager.step.1.init2(成员/广播) + P2pModule.step.1.init2(rpc)
    exec:
      kind: Call
      call: "ExternalClientApi::init2_prepare"
    best_effort: null

  - id: ExternalClientApi.step.2.after_owner_shared_mem_bundle_ready
    module: ExternalClientApi
    mode: Blocking
    deps:
      - res:owner_shared_mem_bundle_ready
    doc: |
      - external: 完成 owner generation / sub_cluster 绑定 + 注册 RPC
      - 依赖: res:owner_shared_mem_bundle_ready + 本模块 step.1(隐式顺序)
    exec:
      kind: Call
      call: "ExternalClientApi::init2_after_owner_shared_mem_bundle_ready"
    best_effort: null

  - id: MasterLeaseManager.step.1.init2
    module: MasterLeaseManager
    mode: Blocking
    deps:
      - P2pModule.step.1.init2
    doc: |
      - 注册: lease RPC
      - 启动: cleanup loop
      - 依赖: P2pModule.step.1.init2(rpc)
    exec:
      kind: Call
      call: "MasterLeaseManager::init2_for_init_dag"
    best_effort: null

  - id: P2pModule.step.2.init3
    module: P2pModule
    mode: Blocking
    deps: []
    doc: |
      - 注册: 额外 RPC(route-probe/user-rpc)
      - 依赖: 本模块 step.1 已完成(隐式顺序)
    exec:
      kind: Call
      call: "P2pModule::init3_for_init_dag"
    best_effort: null

  - id: ClientSegPool.step.2.init3
    module: ClientSegPool
    mode: Blocking
    deps:
      - ClientTransferEngine.step.1.init2
    doc: |
      - 调用 transfer_engine: register segments + open_self_segment
      - 写 cluster_state: publish transfer_ready
      - 依赖: ClientTransferEngine.step.1.init2(engine ready)
    exec:
      kind: Call
      call: "ClientSegPool::init3_for_init_dag"
    best_effort: null

name: all_test

on:
  push:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  pack-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git \
            pigz \
            protobuf-compiler \
            python3-venv \
            rsync

      - name: Verify Docker availability
        run: |
          command -v docker >/dev/null
          if ! docker info >/dev/null 2>&1; then
            sudo systemctl start docker
            docker info >/dev/null
          fi
          docker version

      - name: Install Python dependencies
        run: python3 -m pip install PyYAML

      - name: Prepare CI directories
        run: |
          mkdir -p "$RUNNER_TEMP/fluxon-pack-release/project-data"
          mkdir -p "$RUNNER_TEMP/fluxon-pack-release/project-data/manylinux-release"
          mkdir -p "$RUNNER_TEMP/fluxon-pack-release/project-data/manylinux-cache/cargo-registry"
          mkdir -p "$RUNNER_TEMP/fluxon-pack-release/project-data/manylinux-cache/cargo-git"

      - name: Build manylinux builder image
        run: python3 setup_and_pack/build_pack_fluxonkv_pylib_img.py

      - name: Generate CI pack_release config
        run: |
          python3 setup_and_pack/ci/gen_pack_release_ci_config.py \
            --out-dir setup_and_pack \
            --project-data-root "$RUNNER_TEMP/fluxon-pack-release/project-data"

      - name: Run pack_release
        run: python3 setup_and_pack/pack_release.py --release-dir fluxon_release

      - name: Normalize pack_release debug artifact permissions
        if: ${{ always() }}
        run: |
          chmod -R a+rX fluxon_release || true
          chmod -R a+rX setup_and_pack/nix/runs || true
          find "$RUNNER_TEMP/fluxon-pack-release/project-data" \
            \( -path '*/instances/*/logs' -o -path '*/instances/*/release' -o -path '*/assemblies/*/profile' \) \
            -exec chmod -R a+rX {} + || true

      - name: Upload pack_release debug artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: all-test-pack-release-debug-${{ github.sha }}
          if-no-files-found: warn
          compression-level: 1
          path: |
            fluxon_release/**
            setup_and_pack/nix/runs/**
            ${{ runner.temp }}/fluxon-pack-release/project-data/**/instances/**/logs/**
            ${{ runner.temp }}/fluxon-pack-release/project-data/**/instances/**/release/**
            ${{ runner.temp }}/fluxon-pack-release/project-data/**/assemblies/**/profile/**

  build-doc-site:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: .cached/fluxon_doc_site/npm-cache
          key: ${{ runner.os }}-doc-site-npm-${{ hashFiles('scripts/build_doc_site.py') }}
          restore-keys: |
            ${{ runner.os }}-doc-site-npm-

      - name: Cache Quartz plugins
        uses: actions/cache@v4
        with:
          path: .cached/fluxon_doc_site/toolchain/quartz/.quartz/plugins
          key: ${{ runner.os }}-doc-site-plugins-${{ hashFiles('scripts/build_doc_site.py') }}
          restore-keys: |
            ${{ runner.os }}-doc-site-plugins-

      - name: Set doc site base URL
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY#*/}"
          if [[ "$repo" == *.github.io ]]; then
            base_url="${repo,,}"
          else
            base_url="${owner}.github.io/${repo}"
          fi
          echo "FLUXON_DOC_SITE_BASE_URL=$base_url" >> "$GITHUB_ENV"

      - name: Bootstrap doc site toolchain
        run: python3 scripts/build_doc_site.py bootstrap

      - name: Build doc site
        run: python3 scripts/build_doc_site.py build

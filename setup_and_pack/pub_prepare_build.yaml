PREPARE_TARGETS:
  vendor_runtime:
    kind: 'system_resource'
    dir_name: 'vendor_runtime'
    url: 'system://vendor_runtime'
    binary_install:
      - protoc
  cxxpacked:
    kind: 'remote_archive'
    dir_name: 'cxxpacked'
    url: 'https://github.com/AI-Infra-Team/kvcache_cxx_packer/releases/download/v0.0.74/output_manylinux_2_28_${arch}.tar.gz'
    verify: 'https://github.com/AI-Infra-Team/kvcache_cxx_packer/releases/download/v0.0.74/output_manylinux_2_28_${arch}.tar.gz.sha256'
    verify_format: 'first_token_sha256'
    binary_install:
      - protoc

PREPARE_SCENARIOS:
  pyo3_pack_closed_sdk:
    targets:
      - vendor_runtime
      - cxxpacked
    binary_target: 'cxxpacked'
  cargo_closed_sdk_runtime:
    targets:
      - vendor_runtime
      - cxxpacked
    binary_target: 'cxxpacked'

CACHE_STEPS:
  prepare_vendor_runtime:
    scenarios:
      - pyo3_pack_closed_sdk
      - cargo_closed_sdk_runtime
    inputs:
      - setup_and_pack/pub_prepare_build.py
      - setup_and_pack/pub_prepare_build.yaml
    outputs:
      - fluxon_rs/target/vendor_runtime

  prepare_cxxpacked:
    scenarios:
      - pyo3_pack_closed_sdk
      - cargo_closed_sdk_runtime
    inputs:
      - setup_and_pack/pub_prepare_build.py
      - setup_and_pack/pub_prepare_build.yaml
    outputs:
      - fluxon_rs/target/cxxpacked

RUNTIME_SEARCH_SUBDIRS:
  - lib
  - lib64
  - lib/plugins
  - lib64/plugins

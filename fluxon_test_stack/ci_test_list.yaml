      access_key: admin
      secret_key: admin
      region: us-east-1
      key_prefix: test_rsc/fluxon_fastws
    test_rsc_artifacts:
      ci_src_archive: src_ci.tar.gz
      ci_ext_rsc_archive: fluxon_ci_ext_rsc.tar.gz
  fluxon_tquic:

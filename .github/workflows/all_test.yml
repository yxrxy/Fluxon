name: all_test

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    # Rebuild when doc or homepage inputs change.
    paths:
      - ".github/workflows/all_test.yml"
      - ".github/workflows/docs-pages.yml"
      - "fluxon_py/runtime/ops_ci.py"
      - "deployment/tests/test_ops_ci_pipeline_contract.py"
      - "deployment/tests/test_build_doc_site_contract.py"
      - "fluxon_test_stack/tests/test_test_runner_testbed_contract.py"
      - "fluxon_doc/**"
      - "README.md"
      - "README_CN.md"
      - "pics/**"
      - "LICENSE"
      - "fluxon_rs/rust-toolchain.toml"
      - "scripts/build_doc_site.py"

permissions:
  contents: read

jobs:
  workflow-contract-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install workflow test dependencies
        run: python3 -m pip install PyYAML

      - name: Run workflow contract tests
        run: python3 fluxon_py/runtime/ops_ci.py workflow-contract-tests

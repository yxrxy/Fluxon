schema_version: 9

run:
  mode: full_once
  selectors:
    case_ids: ALL
    profile_ids: [fluxon_fastws, fluxon_tquic, fluxon_sockudo_ws, fluxon_tcp, redis_sharded, alluxio_posix]
    command_ids: ALL
    test_ids: ALL

scenes:
  kv_read_heavy_zipf:
    test_stack:
      mode: KVSTORE
      read_ratio: 0.9
      write_ratio: 0.1
      request_distribution: zipfian
      keyspace_size: 512
      value_size_mode: RANDOM_WEIGHTED_SET
      value_size_weighted_set:
        - size_bytes: 10485760
          weight: 0.25
        - size_bytes: 16777216
          weight: 0.25
        - size_bytes: 25165824
          weight: 0.25
        - size_bytes: 31457280
          weight: 0.25
    select:
      scales: [n1_kvowner_dram_20gib, n2_kvowner_dram_20gib, n5_kvowner_dram_20gib, n9_kvowner_dram_20gib]
      profiles: [fluxon_fastws, fluxon_tquic, fluxon_sockudo_ws, fluxon_tcp, redis_sharded]

  kv_read_heavy_affinity:
    test_stack:
      mode: KVSTORE
      read_ratio: 0.9
      write_ratio: 0.1
      request_distribution: zipfian
      affinity_locality_ratio: 0.85
      keyspace_size: 512
      value_size_mode: RANDOM_WEIGHTED_SET
      value_size_weighted_set:
        - size_bytes: 10485760
          weight: 0.25
        - size_bytes: 16777216
          weight: 0.25
        - size_bytes: 25165824
          weight: 0.25
        - size_bytes: 31457280
          weight: 0.25
    select:
      scales: [n2_kvowner_dram_20gib, n5_kvowner_dram_20gib, n9_kvowner_dram_20gib]
      profiles: [fluxon_fastws, fluxon_tquic, fluxon_sockudo_ws, fluxon_tcp, redis_sharded]

  kv_write_heavy_large_value:
    test_stack:
      mode: KVSTORE
      read_ratio: 0.0
      write_ratio: 1.0
      request_distribution: uniform
      keyspace_size: 10000
      value_size_mode: RANDOM_WEIGHTED_SET
      value_size_weighted_set:
        - size_bytes: 10000
          weight: 0.2
        - size_bytes: 100000
          weight: 0.2
        - size_bytes: 1000000
          weight: 0.2
        - size_bytes: 10000000
          weight: 0.2
        - size_bytes: 50000000
          weight: 0.2
    select:
      scales: [n1_kvowner_dram_20gib, n2_kvowner_dram_20gib, n5_kvowner_dram_20gib, n9_kvowner_dram_20gib]
      profiles: [fluxon_fastws, fluxon_tquic, fluxon_sockudo_ws, fluxon_tcp, redis_sharded]

  rpc_echo_small_payload:
    test_stack:
      mode: RPC
      rpc_backend_kind: FLUXON
      rpc_path: /bench/echo
      rpc_payload_size: 4096
      rpc_payload_mode: BYTES
      rpc_server_source: benchmark_node_role
      rpc_target_role: seed
      read_ratio: 1.0
      write_ratio: 0.0
      request_distribution: uniform
      keyspace_size: 1
    select:
      scales: [n1_kvowner_dram_20gib, n2_kvowner_dram_20gib]
      profiles: [fluxon_fastws, fluxon_tquic, fluxon_sockudo_ws, fluxon_tcp]

  rpc_echo_small_payload_zerorpc:
    test_stack:
      mode: RPC
      rpc_backend_kind: ZERORPC
      rpc_path: /bench/echo
      rpc_payload_size: 4096
      rpc_payload_mode: BYTES
      rpc_server_source: benchmark_node_role
      rpc_target_role: seed
      zerorpc_port_base: 29779
      zerorpc_port_stride: 20
      read_ratio: 1.0
      write_ratio: 0.0
      request_distribution: uniform
      keyspace_size: 1
    select:
      scales: [n1_kvowner_dram_20gib, n2_kvowner_dram_20gib]
      profiles: [fluxon_fastws, fluxon_tquic, fluxon_sockudo_ws, fluxon_tcp]

  fs_open_read_close_smallfiles:
    test_stack:
      mode: PY_FS
      file_size_bytes: 4096
      files_per_worker: 512
      cache_max_bytes: 268435456
    select:
      scales: [n1_kvowner_dram_20gib, n2_kvowner_dram_20gib, n5_kvowner_dram_20gib, n9_kvowner_dram_20gib]
      profiles: [fluxon_fastws, fluxon_tquic, fluxon_sockudo_ws, fluxon_tcp, alluxio_posix]

  fs_write_close_commit:
    test_stack:
      mode: PY_FS
      file_size_bytes: 1048576
      chunk_size_bytes: 262144
      files_per_worker: 64
      cache_max_bytes: 268435456
    select:
      scales: [n1_kvowner_dram_20gib, n2_kvowner_dram_20gib, n5_kvowner_dram_20gib, n9_kvowner_dram_20gib]
      profiles: [fluxon_fastws, fluxon_tquic, fluxon_sockudo_ws, fluxon_tcp, alluxio_posix]

  bench_mq:
    test_stack:
      mode: MPMC
      role_weights:
        producer: 1
        consumer: 1
    select:
      scales: [n1_kvowner_dram_20gib, n2_kvowner_dram_20gib, n5_kvowner_dram_20gib, n9_kvowner_dram_20gib]
      profiles: [fluxon_fastws, fluxon_tquic, fluxon_sockudo_ws, fluxon_tcp]

scales:
  n1_kvowner_dram_20gib:
    duration_seconds: 60
    topology: 1
    owner:
      owner_count: 1
      owner_dram_bytes: 21474836480
    benchmark: &bench_benchmark
      processes_per_target: 1
      threads_per_process: 4
      value_size: 16384
      metric_warmup_seconds: 0
      op_timeout_seconds: 30
      cluster_ready_timeout_seconds: 660
      value_size_list: []
      consumer_sim_handle_ms_range: [700, 1500]

  n2_kvowner_dram_20gib:
    duration_seconds: 60
    topology: 2
    owner:
      owner_count: 2
      owner_dram_bytes: 21474836480
    benchmark: *bench_benchmark

  n5_kvowner_dram_20gib:
    duration_seconds: 60
    topology: 5
    owner:
      owner_count: 5
      owner_dram_bytes: 21474836480
    benchmark: *bench_benchmark

  n9_kvowner_dram_20gib:
    duration_seconds: 60
    topology: 9
    owner:
      owner_count: 9
      owner_dram_bytes: 21474836480
    benchmark: *bench_benchmark

artifact_sets:
  fluxon_fastws:
    release_source: &release_source_fastws
      kind: FLUXON_OPS_FS_S3
      bucket: fluxon-release
      access_key: admin
      secret_key: admin
      region: us-east-1
      key_prefix: profiles/fluxon_fastws
    release_artifacts:
      wheel: fluxon-0.2.1-py3-none-any.whl
    test_rsc_source: &test_rsc_source_fastws
      kind: FLUXON_OPS_FS_S3
      bucket: fluxon-release
      access_key: admin
      secret_key: admin
      region: us-east-1
      key_prefix: test_rsc/fluxon_fastws
    test_rsc_artifacts:
      ci_src_archive: src_ci.tar.gz
      ci_ext_rsc_archive: fluxon_ci_ext_rsc.tar.gz

  fluxon_tquic:

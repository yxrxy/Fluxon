  mpmc_demo_producer:
    port: 18185
    node_bind:
      node: ["example-node-a"]
      hostport: true
      # hostnetwork: true
      hostnetwork: false
      docker_networks: ["a"]
    entrypoint: |
      cd /
      set -euo pipefail

      eval "${FLUXON_PIP_CONF_CMD}"
      eval "${FLUXON_RELEASE_WHEEL_FETCH_CMD}"

      # fluxon_release/install.py performs source extraction and pip installs.

      cd "${FLUXON_SRC_ROOT}/examples"
      cat > "all_config.yaml" <<YAML
      kvexternal:
        instance_key: mpmc_demo_producer_base
        fluxonkv_spec:
          cluster_name: "${FLUXON_CLUSTER_NAME}"
          share_mem_path: "${FLUXON_SHARED_MEM}"
      mpmc_demo:
        key: demo_mpmc
        capacity: 20
        ttl_seconds: 90
        producer:
          instance_key: a
          interval_seconds: 0.05
          count: 0
        consumer:
          instance_key: b
          batch: 1
      YAML
      #sleep inf
      # This container is a debug shell (sleep inf). Exec into it to run demos.
      python3 - <<'PY'
      import time
      from pathlib import Path
      import yaml
      from fluxon_py.api_ext_chan import ChanRole, ChanType, new_or_bind_with_unique_key
      from fluxon_py.config import FluxonKvClientConfig
      from fluxon_py.kvclient import new_store
      from fluxon_py.logging import init_logger

      workdir = Path.cwd()
      cfg = yaml.safe_load(Path("all_config.yaml").read_text(encoding="utf-8"))
      ext_cfg = dict(cfg["kvexternal"])
      demo_cfg = dict(cfg["mpmc_demo"])
      ext_cfg["instance_key"] = str(demo_cfg["producer"]["instance_key"])
      store = new_store(FluxonKvClientConfig(ext_cfg)).unwrap("new_store failed")
      logger = init_logger("deploy_mpmc_producer")
      try:
          producer = new_or_bind_with_unique_key(
              store,
              {"capacity": int(demo_cfg["capacity"]), "ttl_seconds": int(demo_cfg["ttl_seconds"])},
              unique_id=str(demo_cfg["key"]),
              chan_type=ChanType.MPMC,
              chan_role=ChanRole.PRODUCER,
          ).unwrap("bind producer failed")
          while True:
              ts_ms = int(time.time() * 1000)
              payload = f"{demo_cfg['producer']['instance_key']}:{ts_ms}".encode("utf-8")
              producer.put_data({"payload": payload, "ts_ms": ts_ms}).unwrap("put_data failed")
              logger.info(f"[producer] sent: {payload.decode('utf-8')}")
              time.sleep(float(demo_cfg["producer"]["interval_seconds"]))
      finally:
          store.close().unwrap("close failed")
      PY

  mpmc_demo_consumer:
    port: 18186
    node_bind:
      node: ["example-node-a"]
      hostport: true
      # hostnetwork: true
      hostnetwork: false
      docker_networks: ["b"]
    entrypoint: |
      cd /
      set -euo pipefail

      eval "${FLUXON_PIP_CONF_CMD}"
      eval "${FLUXON_RELEASE_WHEEL_FETCH_CMD}"

      # fluxon_release/install.py performs source extraction and pip installs.

      cd "${FLUXON_SRC_ROOT}/examples"
      cat > "all_config.yaml" <<YAML
      kvexternal:
        instance_key: mpmc_demo_consumer_base
        fluxonkv_spec:
          cluster_name: "${FLUXON_CLUSTER_NAME}"
          share_mem_path: "${FLUXON_SHARED_MEM2}"
      mpmc_demo:
        key: demo_mpmc
        capacity: 20
        ttl_seconds: 90
        producer:
          instance_key: a
          interval_seconds: 0.05
          count: 0
        consumer:
          instance_key: b
          batch: 1
      YAML

      #sleep inf
      # This container is a debug shell (sleep inf). Exec into it to run demos.
      python3 - <<'PY'
      import time
      from pathlib import Path
      import yaml
      from fluxon_py.api_ext_chan import ChanRole, ChanType, new_or_bind_with_unique_key
      from fluxon_py.api_error import ChannelClosedError
      from fluxon_py.config import FluxonKvClientConfig
      from fluxon_py.kvclient import new_store
      from fluxon_py.logging import init_logger

      cfg = yaml.safe_load(Path("all_config.yaml").read_text(encoding="utf-8"))
      ext_cfg = dict(cfg["kvexternal"])
      demo_cfg = dict(cfg["mpmc_demo"])
      ext_cfg["instance_key"] = str(demo_cfg["consumer"]["instance_key"])
      store = new_store(FluxonKvClientConfig(ext_cfg)).unwrap("new_store failed")
      logger = init_logger("deploy_mpmc_consumer")
      try:
          consumer = new_or_bind_with_unique_key(
              store,
              {"capacity": int(demo_cfg["capacity"]), "ttl_seconds": int(demo_cfg["ttl_seconds"])},
              unique_id=str(demo_cfg["key"]),
              chan_type=ChanType.MPMC,
              chan_role=ChanRole.CONSUMER,
          ).unwrap("bind consumer failed")
          while True:
              res = consumer.get_data(batch_size=int(demo_cfg["consumer"]["batch"]))
              if not res.is_ok():
                  err = res.unwrap_error()
                  if isinstance(err, ChannelClosedError):
                      break
                  raise SystemExit(f"get_data failed: {err}")
              for item in res.unwrap() or []:
                  payload = item.get("payload", b"") if isinstance(item, dict) else item
                  if isinstance(payload, (bytes, bytearray, memoryview)):
                      logger.info(f"[consumer] got: {bytes(payload).decode('utf-8', 'ignore')}")
                  else:
                      logger.info(f"[consumer] got: {payload}")
              time.sleep(0.2)
      finally:
          store.close().unwrap("close failed")
      PY

  xfer_controller:
    port: 18187
    node_bind:
      node: ["example-node-a"]
      hostport: true
      hostnetwork: false
      docker_networks: ["a"]
    entrypoint: |
      cd /
      set -euo pipefail

      eval "${FLUXON_PIP_CONF_CMD}"
      eval "${FLUXON_RELEASE_WHEEL_FETCH_CMD}"
      apt update
      apt install -y rclone
      echo "Configure rclone locally before using xfer_controller."
      echo "Example: rclone config create test sftp host 192.0.2.10 user example_user pass \"\$(rclone obscure 'CHANGE_ME')\""

      # fluxon_release/install.py performs source extraction and pip installs.

      cd "${FLUXON_SRC_ROOT}/examples/fluxon_xfer_panel"
      cat > "all_config.yaml" <<YAML
      controller:
        instance_key: "fluxon_xfer_accessor_controller"
        kvexternal:
          fluxonkv_spec:
            cluster_name: "${FLUXON_CLUSTER_NAME}"
            share_mem_path: "${FLUXON_SHARED_MEM}"
        db_path: ./xfer_panel.sqlite3
        bootstrap_admin:
          username: admin
          password: CHANGE_ME
        auth:
          token_ttl_seconds: 3600
          pbkdf2_iterations: 200000
        rclone_bin: /usr/bin/rclone
        rclone_copy_flags:
          - -P
          - --ignore-existing
          - --stats
          - 1s
          - --stats-one-line
          - --stats-one-line-date
        max_concurrent_transfers: 1
        dir_list_max_entries: 200
      YAML

      python3 start_controller.py -c all_config.yaml -w ./fluxon_work/xfer_controller_work

